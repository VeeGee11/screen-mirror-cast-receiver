<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Screen Mirror Receiver</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    /* Full-screen video fed by MediaSource. object-fit:contain preserves the
       source aspect ratio (the sender also letterboxes into a fixed frame, so
       both portrait and landscape look correct). */
    #video {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      z-index: 1;
    }
    /* Covers the black screen between the Cast session launching and the
       first decoded frame actually painting (~5-8s: WebSocket connect, fMP4
       init segment, first fragments) — otherwise it just looks hung. Shown by
       default so it's up immediately on load with no JS needed for the
       initial connect; receiver.js toggles it on stop/reconnect/playing. */
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 2;
      background: #000;
    }
    #logo {
      width: 120px;
      height: 120px;
      /* Approximates iOS's squircle app-icon corner rounding. */
      border-radius: 26px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }
    #spinner {
      width: 56px;
      height: 56px;
      border: 5px solid rgba(255, 255, 255, 0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #loading-text {
      color: rgba(255, 255, 255, 0.85);
      font-family: -apple-system, Helvetica, Arial, sans-serif;
      font-size: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <div id="loading">
    <img id="logo" src="logo.png" alt="Screen Mirror">
    <div id="spinner"></div>
    <div id="loading-text">Connecting…</div>
  </div>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="receiver.js"></script>
</body>
</html>
